<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓮ノ空アイコンメーカー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --hasu-pink: #f472b6;
            --hasu-light: #fdf2f8;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--hasu-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }
        h1 { color: var(--hasu-pink); margin-bottom: 5px; font-size: 1.4rem; }
        .sub-title { font-size: 0.9rem; color: #666; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        
        .canvas-wrapper {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            line-height: 0;
        }

        .controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: var(--hasu-pink); }

        input[type="file"] { width: 100%; font-size: 14px; }

        .frame-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .btn-frame {
            border: 2px solid #eee;
            background: white;
            padding: 8px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-frame:hover { border-color: var(--hasu-pink); background: var(--hasu-light); }

        .btn-download {
            background: var(--hasu-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(244, 114, 182, 0.4);
            margin-top: 10px;
        }
        .btn-download:active { transform: scale(0.98); }

        .hint { font-size: 11px; color: #888; margin-top: 5px; line-height: 1.4; }
        .footer-note { font-size: 10px; color: #999; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <h1>蓮ノ空アイコンメーカー</h1>
    <div class="sub-title">様々なフレームを使って<br>自分だけのアイコンを作成しましょう！</div>

    <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="section">
            <label>STEP 1. 画像を選択</label>
            <input type="file" id="imageUpload" accept="image/*">
            <div class="hint">アップロード後、画像をドラッグして位置調整、ピンチ操作で拡大縮小が可能です。</div>
        </div>

        <div class="section">
            <label>STEP 2. フレームを選択</label>
            <div class="frame-grid">
                <button class="btn-frame" onclick="applyFrame('/frames/bgp.png')">B. G. P.</button>
                <button class="btn-frame" onclick="applyFrame('/frames/kaho.png')">花帆</button>
                <button class="btn-frame" onclick="applyFrame('/frames/sayaka.png')">さやか</button>
                <button class="btn-frame" onclick="applyFrame('/frames/kozue.png')">梢</button>
                <button class="btn-frame" onclick="applyFrame('/frames/tsuzuri.png')">綴理</button>
                <button class="btn-frame" onclick="applyFrame('/frames/rurino.png')">瑠璃乃</button>
                <button class="btn-frame" onclick="applyFrame('/frames/megumi.png')">慈</button>
                <button class="btn-frame" onclick="applyFrame('/frames/ginko.png')">吟子</button>
                <button class="btn-frame" onclick="applyFrame('/frames/kosuzu.png')">小鈴</button>
                <button class="btn-frame" onclick="applyFrame('/frames/hime.png')">姫芽</button>
                <button class="btn-frame" onclick="applyFrame('/frames/izumi.png')">泉</button>
                <button class="btn-frame" onclick="applyFrame('/frames/ceras.png')">セラス</button>
            </div>
        </div>

        <button class="btn-download" onclick="saveIcon()">アイコンを保存する</button>
        
        <div class="section" style="background: none; box-shadow: none; padding: 0;">
            <div class="hint">
                ※保存時に枠線が消える場合は、もう一度「保存」ボタンを押してください。<br>
                ※当ツールはファンによる非公式ツールです。
            </div>
        </div>
    </div>

    <div class="footer-note">
        ©プロジェクトラブライブ！蓮ノ空女学院スクールアイドルクラブ
    </div>

    <script>
        const canvas = new fabric.Canvas('mainCanvas', {
            preserveObjectStacking: true
        });

        let userImg = null;
        let frameImg = null;

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    if (userImg) canvas.remove(userImg);
                    userImg = img;
                    img.scaleToWidth(400);
                    canvas.add(img);
                    img.sendToBack();
                    if (frameImg) frameImg.bringToFront();
                    canvas.setActiveObject(img);
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(file);
        });

        function applyFrame(fileName) {
            fabric.Image.fromURL(fileName, function(img) {
                if (frameImg) canvas.remove(frameImg);
                frameImg = img;
                img.set({
                    left: 0,
                    top: 0,
                    selectable: false,
                    evented: false,
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
                canvas.add(img);
                img.bringToFront();
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        function saveIcon() {
            canvas.discardActiveObject().renderAll();
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1,
                multiplier: 2
            });
            const link = document.createElement('a');
            link.download = 'output_icon.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
