<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>蓮之空 Icon 生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #fff5f7; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #444; }
        .canvas-area { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .menu { max-width: 400px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .btn { background: #f472b6; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #ec4899; }
        .frame-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .frame-option { border: 2px solid #eee; border-radius: 5px; cursor: pointer; padding: 5px; text-align: center; font-size: 12px; }
        .frame-option:hover { border-color: #f472b6; }
    </style>
</head>
<body>

    <h1>蓮之空 Icon 生成器</h1>

    <div class="canvas-area">
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div class="menu">
        <input type="file" id="upload" accept="image/*">
        
        <div class="frame-select">
            <div class="frame-option" onclick="applyFrame('frame1.PNG')">邊框 1</div>
            <div class="frame-option" onclick="applyFrame('frame2.png')">邊框 2</div>
        </div>

        <button class="btn" onclick="download()">下載成品</button>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas');
        let currentFrame = null;

        document.getElementById('upload').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(400);
                    canvas.add(img);
                    if (currentFrame) canvas.bringToFront(currentFrame);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applyFrame(url) {
            if (currentFrame) canvas.remove(currentFrame);
            fabric.Image.fromURL(url, function(img) {
                img.set({ left: 0, top: 0, selectable: false, evented: false });
                img.scaleToWidth(canvas.width);
                currentFrame = img;
                canvas.add(img);
                canvas.bringToFront(img);
            });
        }

        function download() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'hasu-icon.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
